services:
  vid2cat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vid2cat-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app/src
    command: ["uvicorn", "vid2cat.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
volumes:
  node_modules: {}
