<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - vid2cat</title>
    <link rel="icon" type="image/png" href="{{ request.url_for('static', path='favicon.png') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
    <div class="page-shell narrow-shell">
        <div class="top-nav plain-nav">
            <a class="brand" href="https://github.com/guohuiyuan/vid2cat" target="_blank" rel="noopener noreferrer">vid2cat</a>
            <div class="nav-actions">
                <a class="ghost-btn" href="/">返回首页</a>
            </div>
        </div>

        {% if message %}
        <div class="notice success">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="notice error">{{ error }}</div>
        {% endif %}

        <section class="content-card">
            <div class="section-title-row">
                <h1>管理员登录</h1>
                <span class="section-hint">如果系统里还没有管理员，首次启动会自动创建默认管理员</span>
            </div>
            <div class="info-panel bootstrap-card">
                <h3>首次默认账号</h3>
                <p>用户名：{{ default_admin_username }}</p>
                <p>默认密码：{{ default_admin_password }}</p>
                <p>首次登录后会强制要求修改密码。</p>
            </div>
            <form class="stack-form" action="/admin/login" method="post">
                <input type="text" name="username" placeholder="管理员用户名" required value="{{ default_admin_username }}">
                <input type="password" name="password" placeholder="管理员密码" required>
                <button class="primary-btn full-width" type="submit">登录后台</button>
            </form>
        </section>
    </div>
</body>
</html>
