<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改管理员密码 - vid2cat</title>
    <link rel="icon" type="image/png" href="{{ request.url_for('static', path='favicon.png') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
    <div class="page-shell narrow-shell">
        <div class="top-nav plain-nav">
            <a class="brand" href="https://github.com/guohuiyuan/vid2cat" target="_blank" rel="noopener noreferrer">vid2cat</a>
            <div class="nav-actions">
                <a class="ghost-btn" href="/admin/logout">退出</a>
            </div>
        </div>

        {% if message %}
        <div class="notice success">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="notice error">{{ error }}</div>
        {% endif %}

        <section class="content-card">
            <div class="section-title-row">
                <h1>强制修改密码</h1>
                <span class="section-hint">管理员 {{ admin.username }} 首次登录后必须先修改默认密码</span>
            </div>
            <form class="stack-form" action="/admin/password" method="post">
                <input type="password" name="current_password" placeholder="当前密码" required>
                <input type="password" name="new_password" placeholder="新密码，至少 8 位" required>
                <input type="password" name="confirm_password" placeholder="确认新密码" required>
                <button class="accent-btn full-width" type="submit">保存新密码</button>
            </form>
        </section>
    </div>
</body>
</html>
