<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - vid2cat</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-shell narrow-shell">
        <div class="top-nav plain-nav">
            <a class="brand" href="https://github.com/guohuiyuan/vid2cat/" target="_blank" rel="noopener noreferrer">vid2cat</a>
            <div class="nav-actions">
                <a class="ghost-btn" href="/">首页</a>
                <a class="ghost-btn" href="/register">注册</a>
                <a class="ghost-btn" href="/admin{% if admin_user %}{% else %}/login{% endif %}">{{ "后台" if admin_user else "管理员" }}</a>
            </div>
        </div>

        {% if message %}
        <div class="notice success">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="notice error">{{ error }}</div>
        {% endif %}

        <section class="content-card">
            <div class="section-title-row">
                <h1>登录账号</h1>
                <span class="section-hint">已有账号就登录继续养；如果只是想试试，也可以直接匿名开始</span>
            </div>
            <form class="stack-form" action="/login" method="post">
                <input type="hidden" name="next" value="{{ next }}">
                <input type="text" name="identity" placeholder="用户名或邮箱" required>
                <input type="password" name="password" placeholder="密码" required>
                {% if current_user and current_user.is_guest %}
                <label class="checkbox-row">
                    <input type="checkbox" name="takeover_guest" value="1" checked>
                    <span>登录后接管当前游客进度</span>
                </label>
                {% endif %}
                <button class="primary-btn full-width" type="submit">立即登录</button>
            </form>
            <div class="empty-state compact">
                不登录也能直接开始养猫；如果你现在正处于游客模式，登录后可以把当前猫和成长进度接管到正式账号。
            </div>
            <div class="form-footer-hint">
                <a class="ghost-btn" href="/my-cat">直接匿名开始</a>
                <span class="section-hint">还没有账号？</span>
                <a class="ghost-btn" href="/register">去注册</a>
            </div>
        </section>
    </div>
</body>
</html>
